name: Release readiness

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  policy:
    name: Policy
    runs-on: ubuntu-latest
    steps:
      - name: Check out prospective merge result
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Inspect version and authoritative hosted state
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          version="$(python3 scripts/release_automation.py validate)"
          printf '{"tag":"v%s","assets":[]}' "$version" > /tmp/manifest.json
          python3 scripts/release_automation.py github-snapshot \
            --manifest /tmp/manifest.json --output /tmp/snapshot.json
          python3 scripts/release_automation.py policy \
            --head-repository '${{ github.event.pull_request.head.repo.full_name }}' \
            --head-ref '${{ github.event.pull_request.head.ref }}' \
            --base-sha '${{ github.event.pull_request.base.sha }}' \
            --head-sha '${{ github.event.pull_request.head.sha }}' \
            --snapshot /tmp/snapshot.json

  python-311:
    name: Python 3.11
    runs-on: ubuntu-latest
    steps:
      - name: Check out prospective merge result
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Install locked Python
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.11.7"
          python-version: "3.11"
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Validate and test
        run: |
          uv sync --locked --python 3.11
          PYTHONDONTWRITEBYTECODE=1 uv run python scripts/release_automation.py validate
          PYTHONDONTWRITEBYTECODE=1 uv run python scripts/validate_ranking_contract.py
          PYTHONDONTWRITEBYTECODE=1 uv run python scripts/c6_syntax_forecast.py validate
          PYTHONDONTWRITEBYTECODE=1 uv run python -m unittest discover -s tests -p 'test_*.py' -q

  python-313:
    name: Python 3.13
    runs-on: ubuntu-latest
    steps:
      - name: Check out prospective merge result
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
      - name: Install locked Python
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.11.7"
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Validate and test
        run: |
          uv sync --locked --python 3.13
          PYTHONDONTWRITEBYTECODE=1 uv run python scripts/release_automation.py validate
          PYTHONDONTWRITEBYTECODE=1 uv run python scripts/validate_ranking_contract.py
          PYTHONDONTWRITEBYTECODE=1 uv run python scripts/c6_syntax_forecast.py validate
          PYTHONDONTWRITEBYTECODE=1 uv run python -m unittest discover -s tests -p 'test_*.py' -q

  distribution:
    name: Distribution
    needs:
      - python-311
      - python-313
    runs-on: ubuntu-latest
    env:
      PYTHONHASHSEED: "0"
      TZ: UTC
      LC_ALL: C
    steps:
      - name: Check out prospective merge result
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Install locked build Python
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7
        with:
          version: "0.11.7"
          python-version: "3.13"
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Build once and inspect distributions
        run: |
          echo "SOURCE_DATE_EPOCH=$(git show -s --format=%ct HEAD)" >> "$GITHUB_ENV"
          export SOURCE_DATE_EPOCH="$(git show -s --format=%ct HEAD)"
          uv build --out-dir dist
          python3 scripts/release_automation.py artifacts --dist dist --output manifest.json
      - name: Smoke normal clean wheel installation and bundled tokenizer
        run: |
          python3 -m venv /tmp/buoy-release-smoke
          /tmp/buoy-release-smoke/bin/python -m pip install --disable-pip-version-check dist/*.whl
          /tmp/buoy-release-smoke/bin/buoy --version
          /tmp/buoy-release-smoke/bin/buoy --help >/dev/null
          /tmp/buoy-release-smoke/bin/python -m buoy_search --help >/dev/null
          /tmp/buoy-release-smoke/bin/python - <<'PY'
          from buoy_search.treatment_token_budget import exact_token_count, load_pinned_tokenizer
          assert exact_token_count(load_pinned_tokenizer(), "Buoy release tokenizer smoke.") == 9
          PY
      - name: Retain diagnostic distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: release-readiness-${{ github.event.pull_request.head.sha }}
          path: |
            dist/*
            manifest.json
          if-no-files-found: error
          retention-days: 14
